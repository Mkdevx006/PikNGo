# Database Configuration
spring.application.name=user-service
spring.datasource.url=jdbc:postgresql://localhost:5432/pikngo_user_db
spring.datasource.username=postgres
spring.datasource.password=Abhi@123
 
# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
 
# Hibernate Configuration - Disabled when using Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
# Validation
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
 
# Server Configuration
server.port=8081
 
# Logging
logging.level.org.springframework.web=INFO
 
# External Integrations (Developer 2)
# Firebase Configuration
firebase.config.path=src/main/resources/service-account.json
