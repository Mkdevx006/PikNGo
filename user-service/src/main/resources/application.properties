# Database Configuration
spring.application.name=user-service
spring.datasource.url=jdbc:postgresql://localhost:5432/pikngo_user_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
 
# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
# Validation
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
 
# Server Configuration
server.port=8081
 
# Logging
logging.level.org.springframework.web=INFO
logging.level.com.pikngo=DEBUG
 
# External Integrations (Developer 2)
# Razorpay Configuration
razorpay.key.id=rzp_test_placeholder
razorpay.key.secret=rzp_test_secret_placeholder

# Firebase Configuration
firebase.config.path=src/main/resources/service-account.json

# Email Configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=welcomedevil006@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.debug=true

# Google OAuth Configuration
google.client.id=${GOOGLE_CLIENT_ID:your-google-client-id}

# Multipart File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enhanced Debugging
logging.level.org.springframework.web.multipart=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.ServletInvocableHandlerMethod=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
