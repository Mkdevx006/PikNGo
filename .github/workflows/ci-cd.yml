name: Java CI/CD with Maven
 
on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
 
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn -B package --file e:/intership/PikNGo/user-service/pom.xml
      
    - name: Run Tests
      run: mvn test --file e:/intership/PikNGo/user-service/pom.xml
